name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  codex-tools:
    name: Build Codex Tools ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact-name: codex-tools-macos
            allow-failure: true
            artifact-path: |
              Codex Tools-macos.zip
          - os: windows-latest
            artifact-name: codex-tools-windows
            allow-failure: false
            artifact-path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow-failure }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        run: npm run tauri build -- --bundles app
        if: matrix.os == 'macos-15'

      - name: Build Tauri bundle
        run: npm run tauri build
        if: matrix.os == 'windows-latest'

      - name: Archive macOS app
        run: |
          mkdir -p "release/Codex Tools-macos"
          ditto "src-tauri/target/release/bundle/macos/Codex Tools.app" "release/Codex Tools-macos/Codex Tools.app"
          cp scripts/install-macos.command "release/Codex Tools-macos/install.command"
          chmod +x "release/Codex Tools-macos/install.command"
          ditto -c -k --sequesterRsrc --keepParent "release/Codex Tools-macos" "Codex Tools-macos.zip"
        if: matrix.os == 'macos-15'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - codex-tools
    if: always() && needs.codex-tools.result == 'success'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/**/*
