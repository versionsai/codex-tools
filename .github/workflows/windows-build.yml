name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "codex-tools/**"
      - ".github/workflows/windows-build.yml"

jobs:
  codex-tools-windows:
    name: Build Codex Tools Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: codex-tools

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: codex-tools/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-tools/src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows installers
        run: npm run tauri build -- --bundles nsis,msi

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: codex-tools-windows
          path: |
            codex-tools/src-tauri/target/release/bundle/nsis/*.exe
            codex-tools/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
