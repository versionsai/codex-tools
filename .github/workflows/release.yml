name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  codex-sync-macos:
    name: Build Codex Sync macOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: ./build_swiftui_app.sh

      - name: Archive app
        run: ditto -c -k --sequesterRsrc --keepParent "dist-swiftui/Codex Sync.app" "Codex Sync-macos.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-sync-macos
          path: Codex Sync-macos.zip

  codex-tools:
    name: Build Codex Tools ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact-name: codex-tools-macos
            artifact-path: |
              codex-tools/Codex Tools-macos.zip
          - os: windows-latest
            artifact-name: codex-tools-windows
            artifact-path: |
              codex-tools/src-tauri/target/release/bundle/nsis/*.exe
              codex-tools/src-tauri/target/release/bundle/msi/*.msi
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: codex-tools
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: codex-tools/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-tools/src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        run: npm run tauri build -- --bundles app
        if: matrix.os == 'macos-15'

      - name: Build Tauri bundle
        run: npm run tauri build
        if: matrix.os == 'windows-latest'

      - name: Archive macOS app
        run: ditto -c -k --sequesterRsrc --keepParent "src-tauri/target/release/bundle/macos/Codex Tools.app" "Codex Tools-macos.zip"
        if: matrix.os == 'macos-15'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - codex-sync-macos
      - codex-tools
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
